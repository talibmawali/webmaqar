<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 90" role="img" aria-label="Architectural MAQAR Studio">

  <!-- ── Left wordmark: all in rust ── -->
  <g font-family="'Segoe UI', 'Arial Unicode MS', Tahoma, system-ui, sans-serif" fill="#BF4A27">
    <text x="2" y="20"  font-size="13" font-weight="700">استوديو مقار</text>
    <text x="2" y="37"  font-size="13" font-weight="700">المعماري</text>
    <text x="2" y="57"  font-size="12" font-weight="600" letter-spacing="0.5">Architectural</text>
    <text x="2" y="76"  font-size="18" font-weight="700" letter-spacing="0.4">MAQAR Studio</text>
  </g>

  <!-- ── Vertical lens divider ── -->
  <path d="M216 6 Q211 45 216 84 Q221 45 216 6 Z" fill="#1E2B4B"/>

  <!-- ── Right: مقر geometric mark ── -->
  <g transform="translate(230 6)">
    <!-- Column 1 (leftmost, shortest) -->
    <polygon points="0,68  16,52  16,68" fill="#1E2B4B"/>
    <polygon points="0,68  16,68  16,74  0,74" fill="#152038"/>

    <!-- Column 2 -->
    <polygon points="14,38  34,38  34,68  18,68  18,52" fill="#1E2B4B"/>
    <polygon points="14,68  34,68  34,74  14,74" fill="#152038"/>

    <!-- Column 3 (tallest left group) -->
    <polygon points="32,18  56,18  56,68  36,68  36,38" fill="#1E2B4B"/>
    <polygon points="32,68  56,68  56,74  32,74" fill="#152038"/>

    <!-- Gap / letter separation -->

    <!-- Column 4 -->
    <polygon points="60,30  84,30  84,68  62,68  62,44" fill="#1E2B4B"/>
    <polygon points="60,68  84,68  84,74  60,74" fill="#152038"/>

    <!-- Column 5 (rightmost) -->
    <polygon points="82,12  106,12  106,68  86,68  86,30" fill="#1E2B4B"/>
    <polygon points="82,68  106,68  106,74  82,74" fill="#152038"/>

    <!-- Rust accent cap top-right -->
    <polygon points="84,0  110,0  110,14  84,14" fill="#BF4A27"/>
    <!-- Fold shadow on cap -->
    <polygon points="98,0  110,0  110,10" fill="#1E2B4B" opacity="0.3"/>
  </g>

</svg>
